<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Cleaner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 2rem;
      background: #1db954;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 32px; height: 32px; fill: #000; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p {
      color: #888;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    .btn-login {
      display: inline-block;
      background: #1db954;
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2.5rem;
      border-radius: 500px;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: transform 0.15s, background 0.15s;
    }

    .btn-login:hover {
      background: #1ed760;
      transform: scale(1.04);
    }

    .error {
      background: #3a1a1a;
      border: 1px solid #7a2222;
      color: #ff6b6b;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .features {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .feature {
      color: #555;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .feature span { color: #1db954; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
    </div>

    <h1>Spotify Cleaner</h1>
    <p>Review your library one track at a time. Keep what you love, remove the rest.</p>

    <div id="error-box" class="error" style="display:none"></div>

    <a href="/login" class="btn-login">Connect with Spotify</a>

    <div class="features">
      <div class="feature"><span>♪</span> 30s preview playback</div>
      <div class="feature"><span>←→</span> Keyboard shortcuts</div>
      <div class="feature"><span>✓</span> Batch deletion</div>
      <div class="feature"><span>♥</span> Liked Songs & Playlists</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const box = document.getElementById('error-box');
      box.textContent = 'Auth error: ' + params.get('error');
      box.style.display = 'block';
    }
  </script>
</body>
</html>
